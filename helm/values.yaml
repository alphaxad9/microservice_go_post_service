# ============================================
# POST SERVICE HELM CHART - COMPLETE VALUES
# ============================================

# Namespace configuration
namespace: post-service

# Service configuration
service:
  name: post-service
  port: 8080

# ConfigMap name (used by all deployments)
configMap:
  name: post-config

# ============================================
# DEPLOYMENTS CONFIGURATION
# ============================================
deployments:
  api:
    replicas: 1
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
  
  consumer:
    replicas: 1
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "250m"
  
  producer:
    replicas: 1
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "250m"

# ============================================
# BACKEND CONFIGURATION
# ============================================
backend:
  post:
    image:
      repository: alphaxad9/post_service
      apiTag: "0.0.7"
      consumerTag: "0.0.5"
      producerTag: "0.0.5"
      pullPolicy: IfNotPresent
    port: 8080

# ============================================
# CONFIGURATION VALUES (for ConfigMap)
# ============================================
config:
  post:
    # Service Identity
    serviceName: "post"
    
    # Server Configuration
    ginMode: "debug"
    frontendUrl: "http://localhost:3000,https://yourdomain.com,http://127.0.0.1:3000"
    logLevel: "DEBUG"
    
    # Database
    postgresHost: "postgres.infrastructure.svc.cluster.local"
    postgresPort: "5432"
    postgresDb: "postgresgo1"
    
    # Kafka
    kafkaBrokers: "kafka-cluster-kafka-bootstrap.kafka-operator.svc.cluster.local:9092"
    kafkaTopic: "microservice_one.events"
    kafkaGroupId: "post_service_outbox_publisher"
    kafkaSecurityProtocol: "PLAINTEXT"
    kafkaEnableAutoCommit: "false"
    kafkaAutoOffsetReset: "earliest"
    kafkaRetries: "5"
    kafkaPollTimeout: "1.0"
    
    # Auth Service
    authServiceUrl: "http://auth-service.auth-service.svc.cluster.local:8000/zedvye_one/"
    authPublicKeyUrl: "http://auth-service.auth-service.svc.cluster.local:8000/zedvye_one/users/public_key/"
    authPublicKeyTtl: "300"
    
    # Redis (placeholder - not used)
    redisHost: "redis.infrastructure.svc.cluster.local"
    redisPort: "6379"
    redisDb: "0"
    redisSocketTimeout: "2"
    redisConnectTimeout: "2"
    redisRetryOnTimeout: "true"
    
    # CORS Settings
    corsAllowedOrigins: "http://localhost:3000,http://127.0.0.1:3000,http://localhost:8080,http://172.18.0.100"
    csrfTrustedOrigins: "http://localhost:3000,http://127.0.0.1:3000,http://localhost:8080,http://172.18.0.100"
    corsAllowCredentials: "True"

# ============================================
# SECRETS CONFIGURATION
# ============================================
secrets:
  # Secret resource names
  post: post-secrets
  postgres: postgres-credentials
  kafka: kafka-credentials
  rabbitmq: rabbitmq-credentials
  redis: redis-credentials
  
  # Secret data values
  data:
    post:
      jwtSecret: "my_jwt_secret_123!"
      internalApiKey: "super-secret-internal-key-change-in-prod"
    
    postgres:
      user: "ishimwe"
      password: "2025New+"

# ============================================
# PERSISTENCE CONFIGURATION
# ============================================
persistence:
  enabled: true
  static:
    size: 5Gi
  media:
    size: 10Gi

# ============================================
# INGRESS CONFIGURATION
# ============================================
ingress:
  enabled: true
  host: post.local

# ============================================
# SERVICE ACCOUNT CONFIGURATION
# ============================================
serviceAccount:
  create: true
  name: post-service-sa
  automount: true
  annotations: {}

# ============================================
# MISC CONFIGURATION
# ============================================
replicaCount: 1

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext: {}

# Autoscaling
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

# Node configuration
nodeSelector: {}
tolerations: []
affinity: {}

# HTTPRoute (if using Gateway API)
httpRoute:
  enabled: false