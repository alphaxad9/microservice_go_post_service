replicaCount: 1

# image:
#   repository: ghcr.io/alphaxad9/post-service
#   pullPolicy: IfNotPresent
#   # Overrides the image tag whose default is the chart appVersion.
#   tag: "0.0.4"
image:
  repository: ghcr.io/alphaxad9/post-service  # ← Note: post-service (with hyphen), not post_service
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "sha-3522d92818f671c7d2be6a23164f01b1f1a23946"  # Use the actual SHA tag from your registry
imagePullSecrets: []
nameOverride: "post-service"
fullnameOverride: "post-service"

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: "post-service"

config:
  # Database configuration
  postgres:
    host: "postgres.infrastructure.svc.cluster.local"
    port: "5432"
    db: "postgresgo1"
    user: "ishimwe"
    
  # Kafka configuration
  kafka:
    brokers: "kafka.infrastructure.svc.cluster.local:9092,kafka.infrastructure.svc.cluster.local:9093"
    topic: "microservice_one.events"
    groupId: "post_service_outbox_publisher"
    securityProtocol: "PLAINTEXT"
    enableAutoCommit: "false"
    autoOffsetReset: "earliest"
    retries: "5"
    pollTimeout: "1.0"
  
  # Auth service configuration
  auth:
    publicKeyUrl: "http://auth-service:8000/zedvye_one/users/public_key/"
    serviceUrl: "http://auth-service:8000/zedvye_one"
    publicKeyTTL: "300"
  
  # Server configuration
  server:
    ginMode: "release"  # Set to "release" for production
    frontendUrl: "http://frontend-service:3000"
    port: "8080"
  
  # Internal API
  internalApiKey: "super-secret-internal-key-change-in-prod"

backend:
  post:
    image:
      repository: ghcr.io/alphaxad9/post-service
      tag: "sha-3522d92818f671c7d2be6a23164f01b1f1a23946"
    port: 8080
    
    # Database
    postgresHost: "postgres.infrastructure.svc.cluster.local"
    postgresPort: "5432"
    postgresDb: "postgresgo1"
    postgresUser: "ishimwe"
    # Password comes from secrets
    
    # Kafka
    kafkaBrokers: "kafka.infrastructure.svc.cluster.local:9092,kafka.infrastructure.svc.cluster.local:9093"
    kafkaTopic: "microservice_one.events"
    kafkaGroupId: "post_service_outbox_publisher"
    kafkaSecurityProtocol: "PLAINTEXT"
    kafkaEnableAutoCommit: "false"
    kafkaAutoOffsetReset: "earliest"
    kafkaRetries: "5"
    kafkaPollTimeout: "1.0"
    
    # Auth Service
    authPublicKeyUrl: "http://auth-service:8000/zedvye_one/users/public_key/"
    authServiceUrl: "http://auth-service:8000/zedvye_one"
    authPublicKeyTTL: "300"
    
    # Server
    ginMode: "release"
    frontendUrl: "http://frontend-service:3000"

secrets:
  postgres: postgres-credentials
  kafka: kafka-credentials
  payment: payment-credentials

podAnnotations: {}

podLabels:
  app: post-service
  service: post

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080
  name: http

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: post-service.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

httpRoute:
  enabled: false
  annotations: {}
  parentRefs:
    - name: gateway
      sectionName: http
  hostnames:
    - post-service.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi

livenessProbe:
  httpGet:
    path: /health/
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health/
    port: 8080
  initialDelaySeconds: 15
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /health/
    port: 8080
  failureThreshold: 30
  periodSeconds: 10
  timeoutSeconds: 5

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

volumes: []

volumeMounts: []

nodeSelector: {}

tolerations: []

affinity: {}