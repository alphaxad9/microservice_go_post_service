apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.kafka }}
  labels:
    app: kafka
    app.kubernetes.io/component: message-broker
type: Opaque
stringData:
  KAFKA_CLIENT_ID: "post-service"
  # Add SASL credentials here if you enable authentication later
  # KAFKA_SASL_USERNAME: {{ .Values.config.auth.kafkaUser | quote }}
  # KAFKA_SASL_PASSWORD: {{ .Values.config.auth.kafkaPass | quote }}