apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.rabbitmq }}
  labels:
    app: rabbitmq
    app.kubernetes.io/component: message-broker
type: Opaque
stringData:
  # Post service doesn't use RabbitMQ - these are placeholders
  RABBITMQ_USER: "placeholder"
  RABBITMQ_PASS: "placeholder"
  # Post service specific (not used)
  POST_RABBITMQ_USER: "placeholder"
  POST_RABBITMQ_PASS: "placeholder"