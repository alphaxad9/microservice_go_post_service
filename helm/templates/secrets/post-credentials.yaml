  apiVersion: v1
  kind: Secret
  metadata:
    name:  {{ .Values.secrets.post }}
    labels:
      app: {{ include "helm.appname" (dict "ctx" $ "svc" "post") }}
      app.kubernetes.io/component: post-service
  type: Opaque
  stringData:
  {{- $secrets := default dict .Values.secrets }}
  {{- $post := default dict $secrets.post }}
  {{- $internal := default dict $secrets.internal }}
    JWT_SECRET: "my_jwt_secret_123!" 
    INTERNAL_API_KEY: {{ default "super-secret-internal-key-change-in-prod" $internal.apiKey | quote }}