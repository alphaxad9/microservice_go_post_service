apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.post }}
  labels:
    app: post
    app.kubernetes.io/component: post-service
type: Opaque
stringData:
  # JWT Secret for token verification
  JWT_SECRET: {{ .Values.secrets.data.post.jwtSecret | default "my_jwt_secret_123!" | quote }}
  
  # Internal API Key for service-to-service communication
  INTERNAL_API_KEY: {{ .Values.secrets.data.post.internalApiKey | default "super-secret-internal-key-change-in-prod" | quote }}
  
  # Auth Service Configuration
  AUTH_PUBLIC_KEY_URL: {{ .Values.config.post.authPublicKeyUrl | default "http://auth-service:8000/zedvye_one/users/public_key/" | quote }}
  AUTH_SERVICE_URL: {{ .Values.config.post.authServiceUrl | default "http://auth-service:8000/zedvye_one" | quote }}
  AUTH_PUBLIC_KEY_TTL: {{ .Values.config.post.authPublicKeyTtl | default "300" | quote }}
  
  # Server Configuration
  GIN_MODE: {{ .Values.config.post.ginMode | default "debug" | quote }}
  PORT: {{ .Values.service.port | default "8080" | quote }}