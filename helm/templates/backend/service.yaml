apiVersion: v1
kind: Service
metadata:
  name: {{ include "helm.appname" (dict "ctx" $ "svc" "post") }}
  labels:
    app: {{ include "helm.appname" (dict "ctx" $ "svc" "post") }}
spec:
  selector:
    app: {{ include "helm.appname" (dict "ctx" $ "svc" "post") }}
  ports:
    - protocol: TCP
      port: {{ .Values.backend.post.port }}
      targetPort: {{ .Values.backend.post.port }}
      name: http
  type: ClusterIP